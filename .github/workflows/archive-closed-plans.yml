name: Archive closed planning docs

# Fires when a PR is merged. For every issue that PR closed, look for a
# planning document in docs/issues/ that references the issue, and open a
# follow-up PR moving it to docs/issues/archived/.
#
# This runs the same audit a maintainer would do by hand, just on the right
# moment instead of periodically. See docs/issues/archived/README.md for
# the manual fallback.

on:
  pull_request:
    types: [closed]

jobs:
  archive:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Identify candidates and stage moves
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # 1. Pull the merged PR body and extract issue numbers from
          #    `Closes #N`, `Fixes #N`, `Resolves #N` keywords (case-insensitive).
          pr_body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body)
          mapfile -t referenced_issues < <(
            printf '%s\n' "$pr_body" \
              | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]*#[0-9]+' \
              | grep -oE '#[0-9]+' \
              | tr -d '#' \
              | sort -u
          )

          if [ ${#referenced_issues[@]} -eq 0 ]; then
            echo "No Closes/Fixes/Resolves keywords found in PR body. Skipping."
            echo "moved=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Referenced issues: ${referenced_issues[*]}"

          # 2. For each issue, verify it is CLOSED, then find a matching
          #    planning doc that references it via `GitHub Issue: [#N]` or
          #    `Issue [#N]` in its header. Move it.
          moved=()
          for n in "${referenced_issues[@]}"; do
            state=$(gh issue view "$n" --repo "$REPO" --json state --jq .state 2>/dev/null || echo OPEN)
            if [ "$state" != "CLOSED" ]; then
              echo "  Issue #$n is $state, not closed; skipping."
              continue
            fi

            # Search active planning docs (not already archived) for the
            # `#N` reference in the first 20 lines (header region).
            for f in docs/issues/*.md; do
              [ -f "$f" ] || continue
              if head -n 20 "$f" | grep -qE "(GitHub Issue:|Issue) \[?#${n}\b"; then
                target="docs/issues/archived/$(basename "$f")"
                git mv "$f" "$target"
                echo "  archived: $f -> $target (issue #$n)"
                moved+=("$(basename "$f" .md):#${n}")
                break
              fi
            done
          done

          if [ ${#moved[@]} -eq 0 ]; then
            echo "No planning docs to archive."
            echo "moved=" >> "$GITHUB_OUTPUT"
          else
            printf 'moved=%s\n' "$(IFS=,; echo "${moved[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Open archive PR
        if: steps.scan.outputs.moved != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOVED: ${{ steps.scan.outputs.moved }}
          MERGED_PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          branch="chore/archive-closed-plans-after-pr${MERGED_PR}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A

          # Build the commit message and PR body using printf so multi-line
          # content stays out of YAML block-scalar indentation rules.
          moved_list=$(printf '%s\n' "$MOVED" | tr ',' '\n')

          commit_msg=$(printf 'chore: archive planning docs closed by PR #%s\n\nAuto-generated archive move triggered by archive-closed-plans.yml.\n\nMoved (slug:issue):\n%s\n\nSee docs/issues/archived/README.md for the rationale.\n' "$MERGED_PR" "$moved_list")
          git commit -m "$commit_msg"
          git push -u origin "$branch"

          pr_body=$(printf 'Automatic archive triggered by [PR #%s](../pull/%s) merging.\n\nThe workflow extracted `Closes #N` / `Fixes #N` / `Resolves #N` keywords from the PR body, verified each issue is now `CLOSED`, and moved every `docs/issues/<slug>.md` whose header references the issue into `docs/issues/archived/`.\n\n**Moved files (slug:issue):**\n\n```\n%s\n```\n\nReviewer: skim the moves and merge if correct. If the workflow misidentified a doc, just close this PR and use the manual fallback documented in `docs/issues/archived/README.md`.\n' "$MERGED_PR" "$MERGED_PR" "$moved_list")

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$branch" \
            --title "chore: archive planning docs closed by PR #${MERGED_PR}" \
            --body "$pr_body"
